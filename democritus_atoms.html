<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德谟克利特的原子世界 - 分子动力学模拟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }
        
        #canvas {
            display: block;
            cursor: crosshair;
        }
        
        .overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #e0e0e0;
            z-index: 10;
            max-width: 400px;
        }
        
        .overlay h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        
        .overlay .quote {
            font-style: italic;
            font-size: 0.95em;
            color: #a0a0a0;
            margin-bottom: 15px;
            border-left: 3px solid #ffd700;
            padding-left: 15px;
        }
        
        .overlay .info {
            font-size: 0.85em;
            line-height: 1.6;
            color: #c0c0c0;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #e0e0e0;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85em;
        }
        
        .controls label {
            display: block;
            margin: 8px 0;
        }
        
        .controls input[type="range"] {
            width: 150px;
            margin-left: 10px;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #e0e0e0;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.8em;
            font-family: 'Courier New', monospace;
        }
        
        .greek-pattern {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 215, 0, 0.1) 20%, 
                rgba(255, 215, 0, 0.2) 50%, 
                rgba(255, 215, 0, 0.1) 80%, 
                transparent 100%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="overlay">
        <h1>Ἀτόμων Κίνησις</h1>
        <div class="quote">"除了原子和虚空，别无他物存在。"<br>—— 德谟克利特 (Δημόκριτος, ~460-370 BC)</div>
        <div class="info">
            古希腊哲学家德谟克利特认为，宇宙由不可分割的原子（ἄτομος）在虚空中永恒运动组成。
            原子大小、形状各异，在无尽的虚空中碰撞、结合、分离，构成万物。
        </div>
    </div>
    
    <div class="controls">
        <label>温度 (速度): <input type="range" id="temp" min="0.1" max="3" step="0.1" value="1"></label>
        <label>原子数量: <input type="range" id="count" min="50" max="300" step="10" value="150"></label>
        <label>引力: <input type="range" id="gravity" min="-0.5" max="0.5" step="0.05" value="0"></label>
        <label>鼠标交互: 悬停吸引，点击排斥</label>
    </div>
    
    <div class="stats">
        <div>原子数: <span id="atomCount">0</span></div>
        <div>平均动能: <span id="avgEnergy">0</span></div>
        <div>碰撞次数: <span id="collisions">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>
    
    <div class="greek-pattern"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // 参数
        let temperature = 1;
        let atomCount = 150;
        let gravityStrength = 0;
        let totalCollisions = 0;
        
        // 鼠标位置
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let mouseActive = false;
        let mouseClick = false;
        
        // 古希腊风格的粒子类型
        const atomTypes = [
            { name: '火', color: '#ff6b35', radius: 3, mass: 0.5, glow: '#ff4500' },
            { name: '气', color: '#87ceeb', radius: 4, mass: 0.8, glow: '#00bfff' },
            { name: '水', color: '#4169e1', radius: 5, mass: 1.0, glow: '#1e90ff' },
            { name: '土', color: '#8b4513', radius: 6, mass: 1.5, glow: '#a0522d' },
            { name: '以太', color: '#ffd700', radius: 2.5, mass: 0.3, glow: '#ffa500' }
        ];
        
        class Atom {
            constructor() {
                this.reset();
            }
            
            reset() {
                const type = atomTypes[Math.floor(Math.random() * atomTypes.length)];
                this.type = type;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * temperature * 2;
                this.vy = (Math.random() - 0.5) * temperature * 2;
                this.radius = type.radius + Math.random() * 2;
                this.mass = type.mass;
                this.trail = [];
                this.maxTrail = 20;
            }
            
            update() {
                // 保存轨迹
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }
                
                // 应用速度
                this.x += this.vx * temperature;
                this.y += this.vy * temperature;
                
                // 重力/浮力
                this.vy += gravityStrength * 0.1;
                
                // 鼠标交互
                if (mouseActive) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 200 && dist > 0) {
                        const force = mouseClick ? -2 : 0.5;
                        this.vx += (dx / dist) * force;
                        this.vy += (dy / dist) * force;
                    }
                }
                
                // 边界碰撞
                if (this.x < this.radius) {
                    this.x = this.radius;
                    this.vx = Math.abs(this.vx);
                }
                if (this.x > canvas.width - this.radius) {
                    this.x = canvas.width - this.radius;
                    this.vx = -Math.abs(this.vx);
                }
                if (this.y < this.radius) {
                    this.y = this.radius;
                    this.vy = Math.abs(this.vy);
                }
                if (this.y > canvas.height - this.radius) {
                    this.y = canvas.height - this.radius;
                    this.vy = -Math.abs(this.vy);
                }
                
                // 速度限制
                const maxSpeed = 8;
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > maxSpeed) {
                    this.vx = (this.vx / speed) * maxSpeed;
                    this.vy = (this.vy / speed) * maxSpeed;
                }
            }
            
            draw() {
                // 绘制轨迹
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.strokeStyle = this.type.color + '30';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                // 绘制光晕
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 3
                );
                gradient.addColorStop(0, this.type.color + '80');
                gradient.addColorStop(0.5, this.type.glow + '40');
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 绘制原子核心
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.type.color;
                ctx.fill();
                
                // 高光
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();
            }
        }
        
        // 原子数组
        let atoms = [];
        
        function initAtoms() {
            atoms = [];
            for (let i = 0; i < atomCount; i++) {
                atoms.push(new Atom());
            }
        }
        
        // 碰撞检测和响应
        function checkCollisions() {
            for (let i = 0; i < atoms.length; i++) {
                for (let j = i + 1; j < atoms.length; j++) {
                    const a1 = atoms[i];
                    const a2 = atoms[j];
                    
                    const dx = a2.x - a1.x;
                    const dy = a2.y - a1.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = a1.radius + a2.radius;
                    
                    if (dist < minDist && dist > 0) {
                        // 碰撞响应
                        const nx = dx / dist;
                        const ny = dy / dist;
                        
                        // 分离原子
                        const overlap = minDist - dist;
                        const separation = overlap / 2;
                        a1.x -= nx * separation;
                        a1.y -= ny * separation;
                        a2.x += nx * separation;
                        a2.y += ny * separation;
                        
                        // 弹性碰撞
                        const dvx = a2.vx - a1.vx;
                        const dvy = a2.vy - a1.vy;
                        const velAlongNormal = dvx * nx + dvy * ny;
                        
                        if (velAlongNormal > 0) continue;
                        
                        const restitution = 0.8;
                        const impulse = -(1 + restitution) * velAlongNormal;
                        const impulseScalar = impulse / (1/a1.mass + 1/a2.mass);
                        
                        a1.vx -= impulseScalar * nx / a1.mass;
                        a1.vy -= impulseScalar * ny / a1.mass;
                        a2.vx += impulseScalar * nx / a2.mass;
                        a2.vy += impulseScalar * ny / a2.mass;
                        
                        totalCollisions++;
                        
                        // 碰撞火花效果
                        if (Math.random() < 0.3) {
                            drawSpark((a1.x + a2.x) / 2, (a1.y + a2.y) / 2);
                        }
                    }
                }
            }
        }
        
        // 火花效果
        const sparks = [];
        function drawSpark(x, y) {
            for (let i = 0; i < 5; i++) {
                sparks.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1,
                    color: `hsl(${Math.random() * 60 + 30}, 100%, 70%)`
                });
            }
        }
        
        function updateSparks() {
            for (let i = sparks.length - 1; i >= 0; i--) {
                const s = sparks[i];
                s.x += s.vx;
                s.y += s.vy;
                s.life -= 0.05;
                
                if (s.life <= 0) {
                    sparks.splice(i, 1);
                } else {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 2 * s.life, 0, Math.PI * 2);
                    ctx.fillStyle = s.color + Math.floor(s.life * 255).toString(16).padStart(2, '0');
                    ctx.fill();
                }
            }
        }
        
        // 绘制虚空网格背景
        function drawVoid() {
            ctx.fillStyle = 'rgba(10, 10, 20, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 微妙的网格
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.03)';
            ctx.lineWidth = 0.5;
            const gridSize = 50;
            
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }
        
        // 动画循环
        let lastTime = 0;
        let frameCount = 0;
        let fps = 0;
        
        function animate(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            // 计算FPS
            frameCount++;
            if (frameCount % 30 === 0) {
                fps = Math.round(1000 / deltaTime);
                document.getElementById('fps').textContent = fps;
            }
            
            drawVoid();
            
            // 更新和绘制原子
            atoms.forEach(atom => {
                atom.update();
                atom.draw();
            });
            
            checkCollisions();
            updateSparks();
            
            // 更新统计
            const avgEnergy = atoms.reduce((sum, a) => 
                sum + 0.5 * a.mass * (a.vx * a.vx + a.vy * a.vy), 0) / atoms.length;
            document.getElementById('atomCount').textContent = atoms.length;
            document.getElementById('avgEnergy').textContent = avgEnergy.toFixed(2);
            document.getElementById('collisions').textContent = totalCollisions;
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseActive = true;
        });
        
        canvas.addEventListener('mouseleave', () => {
            mouseActive = false;
        });
        
        canvas.addEventListener('mousedown', () => {
            mouseClick = true;
        });
        
        canvas.addEventListener('mouseup', () => {
            mouseClick = false;
        });
        
        document.getElementById('temp').addEventListener('input', (e) => {
            temperature = parseFloat(e.target.value);
        });
        
        document.getElementById('count').addEventListener('input', (e) => {
            atomCount = parseInt(e.target.value);
            initAtoms();
        });
        
        document.getElementById('gravity').addEventListener('input', (e) => {
            gravityStrength = parseFloat(e.target.value);
        });
        
        // 触摸支持
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            mouseActive = true;
        });
        
        canvas.addEventListener('touchstart', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            mouseActive = true;
            mouseClick = true;
        });
        
        canvas.addEventListener('touchend', () => {
            mouseClick = false;
        });
        
        // 初始化
        initAtoms();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
