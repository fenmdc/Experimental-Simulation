<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布朗运动演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 10px;
            font-size: 28px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        canvas {
            border: 2px solid #333;
            border-radius: 10px;
            background: #0a0a0a;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .controls {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            min-width: 250px;
        }
        
        .control-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #aaa;
        }
        
        input[type="range"] {
            width: 100%;
            accent-color: #00d4ff;
        }
        
        .value-display {
            text-align: right;
            font-size: 12px;
            color: #00d4ff;
            margin-top: 3px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,212,255,0.3);
        }
        
        .stats {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 12px;
            color: #888;
        }
        
        .stats div {
            margin-bottom: 5px;
        }
        
        .stats span {
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <h1>🔬 布朗运动演示</h1>
    <p class="subtitle">悬浮微粒在流体中由于分子碰撞而产生的随机运动</p>
    
    <div class="container">
        <canvas id="canvas" width="600" height="400"></canvas>
        
        <div class="controls">
            <div class="control-group">
                <label>粒子数量</label>
                <input type="range" id="particleCount" min="1" max="100" value="20">
                <div class="value-display" id="particleCountValue">20</div>
            </div>
            
            <div class="control-group">
                <label>运动速度</label>
                <input type="range" id="speed" min="1" max="10" value="3">
                <div class="value-display" id="speedValue">3</div>
            </div>
            
            <div class="control-group">
                <label>粒子大小</label>
                <input type="range" id="size" min="2" max="15" value="5">
                <div class="value-display" id="sizeValue">5</div>
            </div>
            
            <div class="control-group">
                <label>轨迹长度</label>
                <input type="range" id="trailLength" min="0" max="100" value="30">
                <div class="value-display" id="trailLengthValue">30</div>
            </div>
            
            <button class="btn-primary" onclick="resetSimulation()">🔄 重新开始</button>
            <button class="btn-secondary" onclick="togglePause()">⏸️ 暂停/继续</button>
            <button class="btn-secondary" onclick="clearTrails()">🗑️ 清除轨迹</button>
            
            <div class="stats">
                <div>总位移: <span id="totalDisplacement">0</span> px</div>
                <div>平均速度: <span id="avgSpeed">0</span> px/frame</div>
                <div>碰撞次数: <span id="collisions">0</span></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let particles = [];
        let isPaused = false;
        let animationId;
        let totalCollisions = 0;
        
        // 粒子类
        class Particle {
            constructor(x, y, radius, color) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.trail = [];
                this.startX = x;
                this.startY = y;
                this.totalDistance = 0;
            }
            
            update(speed) {
                // 保存轨迹
                this.trail.push({x: this.x, y: this.y});
                const maxTrail = parseInt(document.getElementById('trailLength').value);
                if (this.trail.length > maxTrail) {
                    this.trail.shift();
                }
                
                // 布朗运动：随机方向和距离
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * speed;
                
                const newX = this.x + Math.cos(angle) * distance;
                const newY = this.y + Math.sin(angle) * distance;
                
                // 边界检测
                if (newX - this.radius > 0 && newX + this.radius < canvas.width) {
                    this.totalDistance += Math.abs(newX - this.x);
                    this.x = newX;
                } else {
                    totalCollisions++;
                }
                
                if (newY - this.radius > 0 && newY + this.radius < canvas.height) {
                    this.totalDistance += Math.abs(newY - this.y);
                    this.y = newY;
                } else {
                    totalCollisions++;
                }
            }
            
            draw() {
                // 绘制轨迹
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.strokeStyle = this.color + '40';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                // 绘制粒子
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                // 粒子光晕
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 2
                );
                gradient.addColorStop(0, this.color + '80');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                ctx.fill();
                
                // 起点标记
                ctx.beginPath();
                ctx.arc(this.startX, this.startY, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ff4444';
                ctx.fill();
            }
            
            getDisplacement() {
                return Math.sqrt(
                    Math.pow(this.x - this.startX, 2) + 
                    Math.pow(this.y - this.startY, 2)
                );
            }
        }
        
        // 生成随机颜色
        function getRandomColor() {
            const colors = [
                '#00d4ff', '#7b2cbf', '#ff006e', '#fb5607', 
                '#ffbe0b', '#8338ec', '#3a86ff', '#06ffa5',
                '#ff4081', '#00e676', '#ff9100', '#2979ff'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // 初始化粒子
        function initParticles() {
            particles = [];
            const count = parseInt(document.getElementById('particleCount').value);
            const size = parseInt(document.getElementById('size').value);
            
            for (let i = 0; i < count; i++) {
                const x = Math.random() * (canvas.width - 100) + 50;
                const y = Math.random() * (canvas.height - 100) + 50;
                particles.push(new Particle(x, y, size, getRandomColor()));
            }
            totalCollisions = 0;
        }
        
        // 动画循环
        function animate() {
            if (!isPaused) {
                // 半透明清除，产生拖尾效果
                ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const speed = parseInt(document.getElementById('speed').value);
                
                let totalDisplacement = 0;
                let totalSpeed = 0;
                
                particles.forEach(particle => {
                    particle.update(speed);
                    particle.draw();
                    totalDisplacement += particle.getDisplacement();
                });
                
                // 更新统计
                const avgDisplacement = (totalDisplacement / particles.length).toFixed(1);
                document.getElementById('totalDisplacement').textContent = avgDisplacement;
                document.getElementById('avgSpeed').textContent = speed;
                document.getElementById('collisions').textContent = totalCollisions;
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        // 控制函数
        function resetSimulation() {
            initParticles();
            // 完全清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        function togglePause() {
            isPaused = !isPaused;
        }
        
        function clearTrails() {
            particles.forEach(p => {
                p.trail = [];
            });
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        // 更新显示值
        document.getElementById('particleCount').addEventListener('input', (e) => {
            document.getElementById('particleCountValue').textContent = e.target.value;
        });
        
        document.getElementById('speed').addEventListener('input', (e) => {
            document.getElementById('speedValue').textContent = e.target.value;
        });
        
        document.getElementById('size').addEventListener('input', (e) => {
            document.getElementById('sizeValue').textContent = e.target.value;
            particles.forEach(p => p.radius = parseInt(e.target.value));
        });
        
        document.getElementById('trailLength').addEventListener('input', (e) => {
            document.getElementById('trailLengthValue').textContent = e.target.value;
        });
        
        // 初始化
        initParticles();
        animate();
    </script>
</body>
</html>
