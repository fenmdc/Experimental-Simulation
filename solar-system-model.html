    }

    }

    }

      color: #aaa;
    }

      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 5px;

      color: #aaa;

    }

      overflow: hidden;
      transition: all 0.4s ease;

      opacity: 1;

      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
    }

      font-size: 0.9rem;
      line-height: 1.6;
      color: #ccc;
      white-space: pre-wrap;
      margin: 0;

      const container = canvas.parentElement;
      const size = Math.min(container.clientWidth - 40, container.clientHeight - 40, 800);
      canvas.width = size;
      canvas.height = size;
      generateStars();
    }

    // 生成背景星星
    function generateStars() {
      stars = [];
      for (let i = 0; i < 200; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 1.5 + 0.5,
          brightness: Math.random()
        });
      }
    }

    // 绘制背景
    function drawBackground() {
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 绘制星星
      stars.forEach(star => {
        const twinkle = Math.sin(time * 2 + star.brightness * 10) * 0.3 + 0.7;
        ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness * twinkle})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    // 绘制轨道
    function drawOrbit(x, y, radius, color, eccentricity = 0) {
      if (eccentricity > 0) {
        // 绘制椭圆轨道
        const a = radius;
        const b = radius * Math.sqrt(1 - eccentricity * eccentricity);
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(x + radius * eccentricity, y, a, b, 0, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // 绘制本轮
    function drawEpicycle(centerX, centerY, radius, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    // 绘制均轮（更明显的环）
    function drawDeferentRing(centerX, centerY, radius, color) {
      ctx.strokeStyle = color + '60';
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 3]);
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // 计算位置
    function calculatePosition(angle, distance, centerX, centerY, eccentricity = 0, parentX = 0, parentY = 0) {
      if (eccentricity > 0) {
        const a = distance;
        const b = distance * Math.sqrt(1 - eccentricity * eccentricity);
        const x = centerX + parentX + a * Math.cos(angle);
        const y = centerY + parentY + b * Math.sin(angle);
        return { x, y };
      }
      return {
        x: centerX + parentX + distance * Math.cos(angle),
        y: centerY + parentY + distance * Math.sin(angle)
      };
    }

    // 绘制中心天体
    function drawCenterBody(x, y, radius, color, name) {
      // 光晕
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius * 2);
      gradient.addColorStop(0, color);
      gradient.addColorStop(0.5, color + '88');
      gradient.addColorStop(1, 'transparent');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius * 2, 0, Math.PI * 2);
      ctx.fill();
      
      // 实体
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // 绘制行星
    function drawPlanet(x, y, radius, color, name, hasRings = false) {
      // 行星阴影效果
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      
      // 阴影
      const gradient = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, 0, x, y, radius);
      gradient.addColorStop(0, 'rgba(255,255,255,0.3)');
      gradient.addColorStop(1, 'rgba(0,0,0,0.3)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      
      // 土星光环
      if (hasRings) {
        ctx.strokeStyle = 'rgba(210, 180, 140, 0.6)';
        ctx.lineWidth = radius * 0.8;
        ctx.beginPath();
        ctx.arc(x, y, radius * 1.8, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // 绘制卫星
    function drawMoons(centerX, centerY, planetRadius, color, count, time) {
      // 伽利略卫星的详细轨道参数（真实周期的相对比例）
      const galileanMoons = [
        { name: '木卫一', orbitScale: 2.0, speed: 4.0, color: '#ffdd44' },    // 1.77天
        { name: '木卫二', orbitScale: 2.8, speed: 2.5, color: '#aaddff' },    // 3.55天
        { name: '木卫三', orbitScale: 3.8, speed: 1.5, color: '#ffccaa' },    // 7.15天
        { name: '木卫四', orbitScale: 5.2, speed: 0.7, color: '#ccaaff' },    // 16.69天
      ];
      
      // 如果是伽利略卫星（4颗），绘制特定的轨道
      if (count === 4 || count <= 4) {
        galileanMoons.forEach((moon, i) => {
          if (i >= count) return;
          const orbitRadius = planetRadius * moon.orbitScale;
          const angle = time * moon.speed;
          const moonX = centerX + orbitRadius * Math.cos(angle);
          const moonY = centerY + orbitRadius * Math.sin(angle);
          const moonRadius = planetRadius * 0.25;
          
          // 绘制轨道线
          ctx.strokeStyle = moon.color + '40';
          ctx.lineWidth = 0.5;
          ctx.setLineDash([2, 2]);
          ctx.beginPath();
          ctx.arc(centerX, centerY, orbitRadius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);
          
          // 绘制卫星
          ctx.fillStyle = moon.color;
          ctx.beginPath();
          ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2);
          ctx.fill();
        });
      } else {
        // 其他卫星简单地随机绘制
        for (let i = 0; i < Math.min(count, 12); i++) {
          const orbitRadius = planetRadius * (2 + i * 0.7);
          const angle = time * (3 - i * 0.3) + (i * Math.PI / 3);
          const moonX = centerX + orbitRadius * Math.cos(angle);
          const moonY = centerY + orbitRadius * Math.sin(angle);
          const moonRadius = planetRadius * 0.15;
          
          // 绘制轨道
          ctx.strokeStyle = 'rgba(200,200,200,0.2)';
          ctx.beginPath();
          ctx.arc(centerX, centerY, orbitRadius, 0, Math.PI * 2);
          ctx.stroke();
          
          ctx.fillStyle = '#ccc';
          ctx.beginPath();
          ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // 绘制小行星带
    function drawAsteroidBelt(centerX, centerY, innerRadius, outerRadius, count = 50) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const distance = innerRadius + Math.random() * (outerRadius - innerRadius);
        const x = centerX + distance * Math.cos(angle);
        const y = centerY + distance * Math.sin(angle);
        const size = Math.random() * 2 + 1;
        
        ctx.fillStyle = 'rgba(150, 150, 150, 0.6)';
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 绘制柯伊伯带
    function drawKuiperBelt(centerX, centerY, radius, count = 30) {
      ctx.fillStyle = 'rgba(100, 150, 200, 0.3)';
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const distance = radius + Math.random() * 30 - 15;
        const x = centerX + distance * Math.cos(angle);
        const y = centerY + distance * Math.sin(angle);
        
        ctx.beginPath();
        ctx.arc(x, y, Math.random() * 2 + 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 绘制金星相位
    function drawVenusPhases(x, y, radius, angle) {
      ctx.fillStyle = '#daa520';
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      
      // 阴影
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath();
      const phaseAngle = (Math.cos(angle) + 1) / 2 * Math.PI;
      ctx.arc(x, y, radius, phaseAngle, phaseAngle + Math.PI);
      ctx.fill();
    }

    // 主绘制函数
    function draw() {
      if (!currentModel) {
        drawBackground();
        return;
      }

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const maxRadius = Math.min(centerX, centerY) - 20;
      const scale = maxRadius / 280 * zoom;

      drawBackground();

      const planets = currentModel.planets;
      
      // 第一层：绘制轨道
      planets.forEach(planet => {
        if (planet.orbitCenter === 'Sun' || currentModel.isHeliocentric) {
          drawOrbit(centerX, centerY, planet.distance * scale, 'rgba(255,255,255,0.15)', planet.eccentricity || 0);
        }
      });

      // 绘制小行星带（现代模型）
      if (currentModel.showAsteroidBelt) {
        drawAsteroidBelt(centerX, centerY, 90 * scale, 110 * scale, 60);
      }

      // 绘制柯伊伯带（现代模型）
      if (currentModel.showKuiperBelt) {
        drawKuiperBelt(centerX, centerY, 260 * scale, 40);
      }

      // 第二层：绘制中心天体
      let sunPos = { x: centerX, y: centerY };
      let earthPos = { x: centerX, y: centerY };

      if (currentModel.isHeliocentric || currentModel.id === 'aristarchus' || currentModel.id === 'copernicus') {
        drawCenterBody(centerX, centerY, 15 * scale, '#ffd700', '太阳');
      } else if (currentModel.id === 'tycho') {
        // 第谷模型：地球在中心
        drawCenterBody(centerX, centerY, 12 * scale, '#4169e1', '地球');
        // 太阳围绕地球转
        const sunAngle = time * currentModel.planets.find(p => p.name === '太阳').speed;
        sunPos = calculatePosition(sunAngle, currentModel.planets.find(p => p.name === '太阳').distance * scale, centerX, centerY);
        drawCenterBody(sunPos.x, sunPos.y, 12 * scale, '#ffd700', '太阳');
      } else {
        // 地心说：地球在中心
        drawCenterBody(centerX, centerY, 12 * scale, '#4169e1', '地球');
      }

      // 第三层：绘制行星
      planets.forEach((planet, index) => {
        const planetRadius = index < 5 ? 6 * scale : 8 * scale;
        let pos;
        let parentCenter = { x: centerX, y: centerY };

        if (planet.orbitCenter === 'Sun') {
          parentCenter = currentModel.id === 'tycho' ? sunPos : { x: centerX, y: centerY };
        }

        if (planet.hasEpicycle) {
          // 本轮-均轮运动
          const mainAngle = time * planet.speed;
          const epicycleAngle = time * planet.epicycleSpeed;
          const mainX = parentCenter.x + planet.distance * scale * Math.cos(mainAngle);
          const mainY = parentCenter.y + planet.distance * scale * Math.sin(mainAngle);
          
          // 绘制均轮（deferent）- 行星绕行的主圆轨道
          drawDeferentRing(parentCenter.x, parentCenter.y, planet.distance * scale, planet.color);
          
          // 绘制本轮（epicycle）- 行星绕行的小圆
          const epicycleRadius = planet.distance * 0.3 * scale;
          drawEpicycle(mainX, mainY, epicycleRadius, planet.color);
          
          // 绘制从均轮中心到本轮中心的连线
          ctx.strokeStyle = planet.color + '80';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(parentCenter.x, parentCenter.y);
          ctx.lineTo(mainX, mainY);
          ctx.stroke();
          
          // 行星在本轮(epicycle)上运动
          pos = {
            x: mainX + epicycleRadius * Math.cos(epicycleAngle),
            y: mainY + epicycleRadius * Math.sin(epicycleAngle)
          };
          
          // 绘制从本轮中心到行星的连线
          ctx.strokeStyle = planet.color + '60';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(mainX, mainY);
          ctx.lineTo(pos.x, pos.y);
          ctx.stroke();
        } else if (planet.orbitCenter === 'Sun' || currentModel.isHeliocentric) {
          const angle = time * planet.speed;
          pos = calculatePosition(angle, planet.distance * scale, centerX, centerY, planet.eccentricity || 0);
        } else {
          // 简单圆形运动
          const angle = time * planet.speed;
          pos = calculatePosition(angle, planet.distance * scale, centerX, centerY);
        }

        // 绘制行星
        drawPlanet(pos.x, pos.y, planetRadius, planet.color, planet.name, planet.hasRings);

        // 绘制卫星
        if (planet.hasMoons) {
          drawMoons(pos.x, pos.y, planetRadius, planet.color, planet.moonCount || 4, time);
        }

        // 绘制月球（地球）
        if (planet.hasMoon) {
          const moonOrbitRadius = planetRadius * 2.5;
          const moonAngle = time * 3;
          const moonX = pos.x + moonOrbitRadius * Math.cos(moonAngle);
          const moonY = pos.y + moonOrbitRadius * Math.sin(moonAngle);
          ctx.fillStyle = '#aaa';
          ctx.beginPath();
          ctx.arc(moonX, moonY, planetRadius * 0.25, 0, Math.PI * 2);
          ctx.fill();
        }

        // 金星相位
        if (planet.hasPhases) {
          drawVenusPhases(pos.x, pos.y, planetRadius, time * planet.speed);
        }
      });

      // 绘制第谷模型的太阳轨道
      if (currentModel.id === 'tycho') {
        drawOrbit(centerX, centerY, 115 * scale, 'rgba(255,215,0,0.3)');
      }

      // 绘制额外球体（亚里士多德、托勒密）
      if (currentModel.extraCircles) {
        currentModel.extraCircles.forEach(circle => {
          if (circle.type === 'sphere') {
            ctx.strokeStyle = circle.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, circle.distance * scale, 0, Math.PI * 2);
            ctx.stroke();
          }
        });
      }
    }

    // 动画循环
    function animate() {
      if (isPlaying) {
        time += 0.01 * speed;
      }
      draw();
      animationId = requestAnimationFrame(animate);
    }

    // 更新模型列表
    function updateModelList() {
      const list = document.getElementById('modelList');
      list.innerHTML = '';

      models.forEach(model => {
        const btn = document.createElement('div');
        btn.className = 'model-btn' + (currentModel && currentModel.id === model.id ? ' active' : '');
        btn.innerHTML = `
          <span class="name">${model.name}</span>
          <span class="year">${model.year}</span>
          <span class="type type-${model.category}">${model.cosmosType}</span>
        `;
        btn.onclick = () => selectModel(model);
        list.appendChild(btn);
      });
    }

    // 选择模型
    function selectModel(model) {
      currentModel = model;
      time = 0;
      updateModelList();
      
      document.getElementById('modelTitle').textContent = `${model.name} (${model.year})`;
      document.getElementById('modelDescription').innerHTML = model.description;
      
      // 更新图例
      updateLegend(model);
    }

    // 更新图例
    function updateLegend(model) {
      const legend = document.getElementById('legend');
      let html = '<div style="margin-bottom: 8px; font-weight: bold;">图例</div>';
      
      model.planets.forEach(planet => {
        html += `
          <div class="legend-item">
            <div class="legend-color" style="background: ${planet.color}"></div>
            <span>${planet.name}</span>
          </div>
        `;
      });

      if (model.isHeliocentric || model.id === 'aristarchus' || model.id === 'copernicus') {
        html += `
          <div class="legend-item">
            <div class="legend-color" style="background: #ffd700"></div>
            <span>太阳 ☀️</span>
          </div>
        `;
      } else {
        // 地心说模型：地球在中心
        let centerBody = '地球';
        if (model.id === 'tycho') {
          centerBody = '地球 (中心)';
        }
        html += `
          <div class="legend-item">
            <div class="legend-color" style="background: #4169e1"></div>
            <span>${centerBody} 🌏</span>
          </div>
        `;
      }

      legend.innerHTML = html;
    }

    // 控件事件
    document.getElementById('speedSlider').addEventListener('input', (e) => {
      speed = parseFloat(e.target.value);
      document.getElementById('speedValue').textContent = speed + 'x';
    });

    document.getElementById('zoomSlider').addEventListener('input', (e) => {
      zoom = parseFloat(e.target.value);
      document.getElementById('zoomValue').textContent = zoom + 'x';
    });

    document.getElementById('playBtn').addEventListener('click', () => {
      isPlaying = !isPlaying;
      document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
    });

    // 展开/收起描述
    const toggleDescBtn = document.getElementById('toggleDescBtn');
    const descriptionContainer = document.getElementById('descriptionContainer');
    
    // 初始状态：展开
    let isDescExpanded = true;
    
    toggleDescBtn.addEventListener('click', () => {
      isDescExpanded = !isDescExpanded;
      if (isDescExpanded) {
        descriptionContainer.style.maxHeight = '400px';
        descriptionContainer.style.opacity = '1';
        descriptionContainer.style.padding = '10px 0';
        toggleDescBtn.textContent = '▲ 收起';
      } else {
        descriptionContainer.style.maxHeight = '0';
        descriptionContainer.style.opacity = '0';
        descriptionContainer.style.padding = '0';
        toggleDescBtn.textContent = '▼ 展开';
      }
    });

    // 初始化
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    updateModelList();
    selectModel(models[0]); // 默认选择第一个模型
    animate();
  </script>
</body>
</html>
